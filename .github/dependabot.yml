version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]
      go-major:
        update-types: ["major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
