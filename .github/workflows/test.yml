name: test

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "kit-toolchain-e2b/**"
      - ".github/workflows/test.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "go test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    # Was 15 while the live-daemon steps SKIPPED on hosted runners (missing
    # sibling). They now actually execute — cold donmai build (~60-90s) + a
    # foreground daemon per live step under -race — so the budget is raised.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      # Two-repo checkout so the live-daemon smokes actually run instead of
      # t.Skipf-ing on an absent ../donmai. This harness EXISTS to drive the
      # donmai daemon lifecycle; skipping it in hosted CI meant a daemon
      # regression could never red this repo (donmai-scan friction #2). Mirrors
      # the two-repo pattern donmai-architecture/boundary-sync.yml already uses.
      # Both repos are public, so the default GITHUB_TOKEN reads RenseiAI/donmai.
      - name: Check out donmai-smokes
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: donmai-smokes

      - name: Check out sibling donmai (system under test)
        uses: actions/checkout@v4
        with:
          repository: RenseiAI/donmai
          ref: main
          fetch-depth: 1
          path: donmai

      - uses: actions/setup-go@v5
        with:
          # The smokes module (go 1.25.12, requires donmai v0.54.0) AND the
          # sibling donmai build both need a modern toolchain; sourcing it from
          # go.mod avoids a per-run GOTOOLCHAIN auto-download of the pinned
          # version and keeps CI's Go in lockstep with the module.
          go-version-file: donmai-smokes/go.mod
          cache: true
          cache-dependency-path: donmai-smokes/go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Node/npm for the opencode harness lane (step18): npm is how
      # harness/opencode_install.go installs the pinned opencode-ai CLI
      # when it isn't already on PATH — mirrors the setup-go/setup-python
      # steps above (pin the toolchain via its dedicated setup action
      # rather than trusting whatever the runner image ships).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Install the pinned opencode CLI (harness.OpenCodePinnedVersion,
      # kept in lockstep with donmai's provider/harness/opencode.PinnedVersion
      # by the pin-bump protocol, 07-design-opencode-spawn.md §8) into an
      # isolated prefix and put it on PATH — same shape as the donmai
      # pre-build step below: prove the CI-side dependency resolves BEFORE
      # the suite runs, rather than letting step18 discover a broken
      # install lazily. harness.EnsureOpenCodeBinary's PATH fast-path then
      # reuses this binary instead of installing it again per-test.
      - name: Install pinned opencode CLI
        run: |
          npm install -g --no-audit --no-fund --prefix "${RUNNER_TEMP}/opencode-pin" opencode-ai@1.17.18
          echo "${RUNNER_TEMP}/opencode-pin/bin" >> "$GITHUB_PATH"

      - name: Verify pinned opencode CLI
        run: |
          "${RUNNER_TEMP}/opencode-pin/bin/opencode" --version

      # Warm the donmai module cache and prove the binary-under-test builds
      # BEFORE the suite, with a 2-attempt retry (Wave 0 mitigation: a flaky
      # sibling checkout/build must not brick the merge queue, and a build
      # break should fail here fast rather than surface as an opaque in-test
      # skip). GOWORK is cleared so ../donmai resolves its own go.mod — matches
      # what harness.BuildBinary does for the in-test build.
      - name: Pre-build donmai binary (warm cache, 2-attempt retry)
        working-directory: donmai
        run: |
          set -u
          for attempt in 1 2; do
            if GOWORK= go build -o "${RUNNER_TEMP}/donmai-prebuild" ./cmd/donmai; then
              echo "donmai build OK (attempt ${attempt})"
              exit 0
            fi
            echo "::warning::donmai sibling build attempt ${attempt} failed; retrying"
            sleep 5
          done
          echo "::error::donmai sibling build failed after 2 attempts"
          exit 1

      - name: kit toolchain local gates
        working-directory: donmai-smokes
        run: make test-kit-toolchain

      - name: go vet
        working-directory: donmai-smokes
        run: go vet ./...

      # GOWORK=off + -race matches the Makefile gate (`make test`). The
      # sibling ../donmai is now present, so the live-daemon steps
      # (step1..step6 in the root package) execute instead of skipping.
      # Tee the verbose output so the liveness guard below can assert the
      # daemon-lifecycle canary actually ran.
      - name: go test
        working-directory: donmai-smokes
        run: |
          set -o pipefail
          GOWORK=off go test -race -v ./... -timeout 18m 2>&1 | tee "${RUNNER_TEMP}/gotest.log"

      # Gate-liveness guard (Wave 0.3 / R3.2): the daemon-lifecycle suite's
      # reason for existing is to run the live daemon. If the canary
      # (TestAfDaemonLifecycle, step1) SKIPPED — the exact silent failure this
      # fix removes — or never reported PASS, fail the job even though `go test`
      # exited 0. A deliberately-broken sibling checkout thus reds this repo.
      - name: Guard — daemon-lifecycle smoke must actually execute
        working-directory: donmai-smokes
        run: |
          LOG="${RUNNER_TEMP}/gotest.log"
          if grep -Eq '^\s*--- SKIP: TestAfDaemonLifecycle\b' "$LOG"; then
            echo "::error::TestAfDaemonLifecycle SKIPPED — the live-daemon lifecycle smoke did not run in hosted CI (sibling ../donmai checkout/build did not take effect). This suite's reason for existing did not execute."
            exit 1
          fi
          if ! grep -Eq '^\s*--- PASS: TestAfDaemonLifecycle\b' "$LOG"; then
            echo "::error::TestAfDaemonLifecycle did not report PASS — daemon-lifecycle coverage did not execute (0 live-daemon tests ran)."
            exit 1
          fi
          echo "Gate-liveness OK: daemon-lifecycle canary executed (PASS observed, no SKIP)."

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: go.mod

      # Mirrors ../donmai's CI lint step (same pinned action + version),
      # matching the Makefile gate (`make lint`).
      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.11.4
